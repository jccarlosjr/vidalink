<div class="modal modal-lg fade" id="relatorioModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-2" aria-labelledby="relatorioModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="relatorioModalLabel">Novo Relatório</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="relatorioForm">
                    <div class="row">
                        <div class="col-md-12">
                            <label for="" class="label">Cuidador(a)</label>
                            <input type="hidden" id="cuidadora_id_modal_relatorio">
                            <div class="col-md-12 d-flex">
                                <input id="cuidadora_nome_modal_relatorio" type="text" class="form-control form-control-sm" placeholder="Selecione um(a) Cuidador(a)" readonly="readonly">
                                <button type="button" class="btn-modern btn-sm" id="abrirSearchCuidadoraModal"><i class="bi bi-search"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label for="status_modal_relatorio" class="label">Status</label>
                            <select name="status_modal_relatorio" id="status_modal_relatorio" class="form-select form-select-sm">
                                <option value="ABERTO">Aberto</option>
                                <option value="FECHADO">Fechado</option>
                                <option value="PAGO">Pago</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="data_referencia_modal_relatorio" class="label">Data Referência</label>
                            <input type="date" name="data_referencia_modal_relatorio" id="data_referencia_modal_relatorio" class="form-control form-control-sm">
                        </div>
                    </div>
                    <hr>
                    <label class="">Pagamentos para esse(a) Cuidador(a)</label>
                    <div class="row mt-2">
                        <div class="col-md-12 d-flex justify-content-between">
                        </div>
                        <div class="col-md-12">
                            <div id="pagamentos_list_relatorio">

                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="saveRelatorioBtn" class="btn-modern"><i class="bi bi-floppy"></i>Salvar</button>
            </div>
        </div>
    </div>
</div>


<div class="modal modal-xl fade" id="searchCuidadoraModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-2" aria-labelledby="searchCuidadoraModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="searchCuidadoraModalLabel">Buscar Cuidador(a)</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row g-2 align-items-end mb-3">
                    <div class="col-md-4">
                        <label class="form-label" for="filter_type_cuidadora">Tipo</label>
                        <select name="filter_type_cuidadora" id="filter_type_cuidadora" class="form-select form-select-sm">
                            <option value="nome">Nome</option>
                            <option value="cpf">CPF</option>
                            <option value="cnpj">CNPJ</option>
                            <option value="telefone">Telefone</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Valor</label>
                        <input type="text" id="filter_value_cuidadora" class="form-control form-control-sm">
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <button class="text-decoration-none btn-modern" id="filter_btn_cuidadora">
                            <i class="bi bi-search"></i> Filtrar
                        </button>
                        <button class="text-decoration-none btn-modern ms-2" id="clear_filter_btn_cuidadora">
                            <i class="bi bi-x-circle"></i> Limpar
                        </button>
                    </div>
                </div>
                <div class="row">
                    <div id="result_cuidadora"></div>
                </div>
            </div>
            <div class="modal-footer"></div>
        </div>
    </div>
</div>
