<div class="modal modal-lg fade" id="pagamentoModal" tabindex="-2" aria-labelledby="pagamentoModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="pagamentoModalLabel">Novo Pagamento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="pagamentoForm">
                    <div class="row">
                        <div class="col-md-12">
                            <label for="" class="label">Plantão</label>
                            <div class="col-md-12 d-flex">
                                <input type="text" class="form-control form-control-sm" placeholder="Selecione o Plantão ->" reandonly><button type="button" class="btn-modern btn-sm" id="abrirSearchPlantao"><i class="bi bi-search"></i></button>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label for="" class="label">Paciente</label>
                            <div class="col-md-12">
                                <input type="text" class="form-control form-control-sm" reandonly>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label for="" class="label">Cuidador(a)</label>
                            <div class="col-md-12">
                                <input type="text" class="form-control form-control-sm" reandonly>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="" class="label">Regra</label>
                            <div class="col-md-12">
                                <select name="" id="" class="form-select form-select-sm">
                                    <option value=""></option>
                                </select>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="" class="label">Valor Calculado</label>
                            <div class="col-md-12">
                                <input type="text" class="form-control form-control-sm currency">
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="" class="label">Status</label>
                            <div class="col-md-12">
                                <select name="" id="" class="form-select form-select-sm">
                                    <option value="PENDENTE">Pendente</option>
                                    <option value="PAGO">Pago</option>
                                    <option value="CANCELADO">Cancelado</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="savePagamentoBtn" class="btn-modern"><i class="bi bi-floppy"></i>Salvar</button>
            </div>
        </div>
    </div>
</div>


<div class="modal modal-lg fade" id="searchPlantaoModal" tabindex="-2" aria-labelledby="searchPlantaoModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="searchPlantaoModalLabel">Buscar Plantão</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row mb-4">
                    <div class="col-md-4">
                        <label class="form-label" for="data_inicio">Início do Plantão</label>
                        <input type="date" id="data_inicio" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="data_fim">Fim do Plantão</label>
                        <input type="date" id="data_fim" class="form-control form-control-sm">
                    </div>
                </div>
                <div class="row g-2 align-items-end mb-3">
                    <div class="col-md-4">
                        <label class="form-label" for="filter_type">Tipo</label>
                        <select name="filter_type" id="filter_type" class="form-select form-select-sm">
                            <option selected value="cuidador__nome">Nome (Cuidador(a))</option>
                            <option value="cuidador__cpf">CPF (Cuidador(a))</option>
                            <option value="cuidador__cnpj">CNPJ (Cuidador(a))</option>
                            <option value="paciente__nome">Nome (Paciente)</option>
                            <option value="paciente__cpf">CPF (Paciente)</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Valor</label>
                        <input type="text" id="filter_value" class="form-control form-control-sm">
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <button class="text-decoration-none btn-modern" id="filter_btn">
                            <i class="bi bi-search"></i> Filtrar
                        </button>
                        <button class="text-decoration-none btn-modern ms-2" id="clear_filter_btn">
                            <i class="bi bi-x-circle"></i> Limpar
                        </button>
                    </div>
                </div>
                <div class="row">
                    <div id="result_plantao"></div>
                </div>
            </div>
            <div class="modal-footer"></div>
        </div>
    </div>
</div>
