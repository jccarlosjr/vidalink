{% extends "base.html" %}
{% load static %}

{% block head %}
<title>Relatórios</title>
{% endblock %}

{% block content %}
<main class="container-fluid py-4 mb-5">
    <!-- Header -->
    <div class="row align-items-center mb-4">
        <div class="col-md-12 col-12 mb-3 mb-md-0">
            <h4 class="mb-0 fw-bold">Relatórios</h4>
            <a class="shadow-lg mt-2 text-decoration-none btn-modern" id="novoRelatorioBtn" title="Adicionar Novo Relatório">
                <i class="bi bi-plus-circle me-2"></i>Novo Relatório
            </a>
        </div>
    </div>

    <div class="accordion shadow-sm" id="accordionFlushExample">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
                    Filtros
                </button>
            </h2>
            <div id="flush-collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionFlushExample">
                <div class="accordion-body">
                    <div class="row g-2 align-items-end mb-3">
                        <div class="col-md-2">
                            <label class="form-label" for="filter_type">Tipo</label>
                            <select name="filter_type" id="filter_type" class="form-select form-select-sm">
                                <option selected value="codigo_interno">Código Interno</option>
                                <option value="status">Status</option>
                                <option value="profissional__nome">Nome (Profissional)</option>
                                <option value="profissional__cpf">CPF (Profissional)</option>
                                <option value="profissional__cnpj">CNPJ (Profissional)</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Valor</label>
                            <input type="text" id="filter_value" class="form-control form-control-sm">
                        </div>

                        <div class="col-md-2 d-flex">
                            <button class="text-decoration-none btn-modern" id="filter_btn">
                                <i class="bi bi-search"></i> Filtrar
                            </button>
                            <button class="text-decoration-none btn-modern ms-2" id="clear_filter_btn">
                                <i class="bi bi-x-circle"></i> Limpar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div class="mt-2" id="relatorios_list">
    </div>

    <div id="pagination"></div>
</main>

{% include 'partials/modal_relatorios.html' %}
{% endblock %}

{% block scripts %}
<script src="{% static 'js/financeiro/relatorios.js' %}"></script>
{% endblock %}
