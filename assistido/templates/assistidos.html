{% extends "base.html" %}
{% load static %}

{% block head %}
<title>Assistidos</title>
{% endblock %}

{% block content %}
<main class="container-fluid py-4 mb-5">
    <!-- Header -->
    <div class="row align-items-center mb-4">
        <div class="col-md-12 col-12 mb-3 mb-md-0">
            <h4 class="mb-0 fw-bold">Assistidos</h4>
            <a class="shadow-lg mt-2 text-decoration-none btn-modern border rounded-3" id="novoAssistidoBtn" title="Adicionar Novo Assistido">
                <i class="bi bi-plus-circle me-2"></i>Novo Assistido
            </a>
        </div>
    </div>

    <div class="accordion shadow-sm" id="accordionFlushExample">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
                    Filtros
                </button>
            </h2>
            <div id="flush-collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionFlushExample">
                <div class="accordion-body">
                    <div class="row g-2 align-items-end mb-5">
                        <div class="col-md-2">
                            <label class="form-label">Tipo</label>
                            <select name="filter_type" id="filter_type" class="form-select form-select-sm">
                                <option selected value="">Selecione um filtro</option>
                                <option value="nome">Nome</option>
                                <option value="responsaveis__nome">Nome (Responsável)</option>
                                <option value="responsaveis__cpf">CPF (Responsável)</option>
                                <option value="responsaveis__telefone">Telefone (Responsável)</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">Valor</label>
                            <input type="text" id="filter_value" class="form-control form-control-sm">
                        </div>

                        <div class="col-md-1 mt-2 form-check form-switch d-inline-flex">
                            <input class="form-check-input" type="checkbox" id="filter_active" checked="on">
                            <label class="form-check-label ms-1" for="filter_active">
                                Ativo
                            </label>
                        </div>

                        <div class="col-md-2 d-flex">
                            <button class="text-decoration-none btn-modern" id="filter_btn">
                                <i class="bi bi-search"></i> Filtrar
                            </button>
                            <button class="text-decoration-none btn-modern ms-2" id="clear_filter_btn">
                                <i class="bi bi-x-circle"></i> Limpar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabela de Assistidos -->
    <div class="row ms-2" id="table-assistidos">
    </div>
    <div id="pagination"></div>
</main>

{% include 'partials/assistido_modals.html' %}
{% include 'partials/respo_modals.html' %}
{% endblock %}

{% block scripts %}
<script src="{% static 'js/assistidos/assistidos.js' %}"></script>
{% endblock %}
