{% extends "base.html" %}
{% load static %}

{% block head %}
<title>Cuidadoras</title>
{% endblock %}

{% block content %}
<main class="container-fluid py-4">
    <!-- Header -->
    <div class="row align-items-center mb-4">
        <div class="col-md-12 col-12 mb-3 mb-md-0">
            <h4 class="mb-0 fw-bold">Cuidadoras</h4>
            <a class="shadow-lg mt-2 text-decoration-none btn-modern" id="novaCuidadoraBtn"
                title="Adicionar Nova Cuidadora">
                <i class="bi bi-plus-circle me-2"></i>Nova Cuidadora
            </a>
        </div>
    </div>

    <!-- Toolbar / Search Area -->
    <div class="card border-0 shadow-sm mb-4 bg-body-tertiary">
        <div class="card-body p-3">
            <form method="GET" class="d-flex align-items-center gap-2 m-0">
                <div class="input-group">
                    <span class="input-group-text bg-body text-body border-end-0">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" name="search" class="form-control bg-body text-body border-start-0 ps-0"
                        placeholder="Pesquisar cuidadora..." value="{{ request.GET.search }}">
                </div>
                <button type="submit" class="btn btn-outline-secondary">Buscar</button>
            </form>
        </div>
    </div>

    <!-- Tabela de Cuidadoras -->
    <div class="row">
        <div class="card border-0 shadow-sm mb-4 bg-body-tertiary">
            <div class="card-body p-3">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center">Nome</th>
                                <th class="text-center">CPF</th>
                                <th class="text-center">Telefone</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="table-cuidadoras">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div id="pagination"></div>
</main>

{% include 'partials/cuidadoras_modal.html' %}

<script src="{% static 'js/cuidadoras/cuidadoras.js' %}"></script>
{% endblock %}
