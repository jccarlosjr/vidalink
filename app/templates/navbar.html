{% load static %}

<aside id="sidebar" class="sidebar">

  <div class="sidebar-header">
    <span class="logo-text">Nav Link</span>
    <button id="toggleSidebar" class="toggle-btn">
      <i class="bi bi-list"></i>
    </button>
  </div>

  <ul class="sidebar-menu">

    <!-- ESCALAS -->
    <li class="menu-item has-submenu">
      <a href="#">
        <i class="bi bi-calendar-week"></i>
        <span class="menu-label">Escalas</span>

      <ul class="submenu">

        <li><a href="{% url 'plantoes' %}"><i class="bi bi-calendar2-check"></i> Plantões</a></li>

    <li class="menu-item">
      <a href="{% url 'pacientes' %}">
        <i class="bi bi-person-hearts"></i>
        <span class="menu-label">Pacientes</span>
      </a>
    </li>

    <!-- CUIDADORAS -->
    <li class="menu-item">
      <a href="{% url 'cuidadoras' %}">
        <i class="bi bi-person-vcard"></i>

    </li>

    <li class="menu-item has-submenu">
      <a href="#">
        <i class="bi bi-gear"></i>

        <li><a href="#"><i class="bi bi-people"></i> Usuários</a></li>
