{% extends "base.html" %}
{% load static %}

{% block head %}
<title>Pacientes</title>
{% endblock %}

{% block content %}
<main class="container-fluid py-4">
    <!-- Header -->
    <div class="row align-items-center mb-4">
        <div class="col-md-12 col-12 mb-3 mb-md-0">
            <h4 class="mb-0 fw-bold">Pacientes</h4>
            <button class="btn btn-sm btn-outline-success shadow-sm mt-2" id="novoPacienteBtn"
                title="Adicionar Novo Paciente">
                <i class="bi bi-plus-circle me-2"></i>Novo Paciente
            </button>
        </div>
    </div>

    <!-- Toolbar / Search Area -->
    <div class="card border-0 shadow-sm mb-4 bg-body-tertiary">
        <div class="card-body p-3">
            <form method="GET" class="d-flex align-items-center gap-2 m-0">
                <div class="input-group">
                    <span class="input-group-text bg-body text-body border-end-0">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" name="search" class="form-control bg-body text-body border-start-0 ps-0"
                        placeholder="Pesquisar paciente..." value="{{ request.GET.search }}">
                </div>
                <button type="submit" class="btn btn-outline-secondary">Buscar</button>
            </form>
        </div>
    </div>

    <!-- Tabela de Pacientes -->
    <div class="card border-0 shadow-sm bg-body">
        <div class="card-body p-0">
            <!-- Table Responsiva wrapper -->
            <div class="table-responsive rounded">
                <table class="table table-hover align-middle mb-0 text-body">
                    <thead class="table">
                        <tr>
                            <th class="ps-4">Paciente</th>
                            <th class="text-center">Endereço</th>
                            <th class="text-center pe-4">Observações</th>
                            <th class="text-center pe-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody class="table" id="table-pacientes">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

{% include 'partials/novo_paciente_modal.html' %}

<script src="{% static 'js/pacientes/pacientes.js' %}"></script>
<script src="{% static 'js/pacientes/novo_paciente.js' %}"></script>
{% endblock %}
