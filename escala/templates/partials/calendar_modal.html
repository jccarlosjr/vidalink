<div class="modal modal-xl fade" id="novaEscalaModal" tabindex="-1" aria-labelledby="novaEscalaModalLabel"
    aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="novaEscalaModalLabel">Calendário</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <button class="btn-modern">Escolher um Paciente</button>
                    </div>
                    <div class="col-md-6">
                        <button class="btn-modern">Escolher uma Cuidadora</button>
                    </div>
                </div>

                <div class="container calendar-container mt-4">
                    <h4>Selecione os dias</h4>
                    <div class="calendar-header">
                        <div class="d-flex gap-2">
                            <select id="month" class="form-select"></select>
                            <select id="year" class="form-select"></select>
                        </div>
                    </div>

                    <div class="calendar-grid mb-2">
                        <div class="day-header">Dom</div>
                        <div class="day-header">Seg</div>
                        <div class="day-header">Ter</div>
                        <div class="day-header">Qua</div>
                        <div class="day-header">Qui</div>
                        <div class="day-header">Sex</div>
                        <div class="day-header">Sáb</div>
                    </div>

                    <div id="calendar" class="calendar-grid"></div>

                </div>
            </div>

        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
    </div>
</div>
</div>
