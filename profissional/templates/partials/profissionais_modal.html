<div class="modal modal-lg fade" id="novoProfissionalModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-2" aria-labelledby="novoProfissionalModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="novoProfissionalModalLabel">Novo Profissional</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="novoProfissionalForm">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-1">
                                <input type="hidden" id="id_profissional" name="id_profissional">
                                <label for="nome" class="form-label">Nome</label>
                                <input type="text" class="form-control form-control-sm" id="nome" name="nome" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-1">
                                <label for="cpf" class="form-label">CPF</label>
                                <input type="text" maxlength="14" class="form-control form-control-sm cpf-mask" id="cpf" name="cpf" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-1">
                                <label for="nascimento" class="form-label">Nascimento</label>
                                <input type="date" class="form-control form-control-sm" id="nascimento" name="nascimento" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-1">
                                <label for="cnpj" class="form-label">CNPJ</label>
                                <input type="text" class="form-control form-control-sm cnpj-mask" id="cnpj" name="cnpj" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-1">
                                <label for="telefone" class="form-label">Telefone</label>
                                <input type="text" maxlength="14" class="form-control form-control-sm celphone-mask" id="telefone" name="telefone" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-1">
                                <label for="cep" class="form-label">CEP</label>
                                <input type="text" maxlength="9" class="form-control form-control-sm cep-mask" id="cep" name="cep" required>
                            </div>
                        </div>
                        <div class="col-md-7">
                            <div class="mb-1">
                                <label for="endereco" class="form-label">Endereço</label>
                                <input type="text" class="form-control form-control-sm" id="endereco" name="endereco" required>
                            </div>
                        </div>
                        <div class="col-md-2">
                            <div class="mb-1">
                                <label for="numero" class="form-label">Número</label>
                                <input type="text" class="form-control form-control-sm" id="numero" name="numero" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-1">
                                <label for="complemento" class="form-label">Complemento</label>
                                <input type="text" class="form-control form-control-sm" id="complemento" name="complemento">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-1">
                                <label for="bairro" class="form-label">Bairro</label>
                                <input type="text" class="form-control form-control-sm" id="bairro" name="bairro" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-1">
                                <label for="cidade" class="form-label">Cidade</label>
                                <input type="text" class="form-control form-control-sm" id="cidade" name="cidade" required>
                            </div>
                        </div>
                        <div class="col-md-2">
                            <div class="mb-1">
                                <label for="estado" class="form-label">Estado</label>
                                <select class="form-select form-select-sm" id="estado" name="estado">
                                    {% include 'partials/ufs.html' %}
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-1">
                                <label for="codigo_banco" class="form-label">Banco</label>
                                <select name="codigo_banco" id="codigo_banco" class="form-select form-select-sm">
                                    <option value="">Selecione o banco</option>
                                    <option value="001">Banco do Brasil</option>
                                    <option value="104">Caixa Econômica Federal</option>
                                    <option value="033">Santander</option>
                                    <option value="237">Bradesco</option>
                                    <option value="341">Itaú S/A</option>
                                    <option value="422">Banco Safra</option>
                                    <option value="745">Citibank</option>
                                    <option value="047">Banese</option>
                                    <option value="260">Nubank</option>
                                    <option value="077">Banco Inter</option>
                                    <option value="336">C6 Bank</option>
                                    <option value="623">Banco Pan</option>
                                    <option value="290">PagBank (PagSeguro)</option>
                                    <option value="380">PicPay Bank</option>
                                    <option value="323">Mercado Pago</option>
                                    <option value="121">Agibank</option>
                                    <option value="654">Banco Digimais</option>
                                    <option value="212">Banco Original</option>
                                    <option value="012">Banco Inbursa</option>
                                    <option value="082">Banco Topázio</option>
                                    <option value="461">Asaas</option>
                                    <option value="041">Banrisul</option>
                                    <option value="748">Sicredi</option>
                                    <option value="756">Sicoob</option>
                                    <option value="655">Banco Votorantim</option>
                                    <option value="318">Banco BMG</option>
                                    <option value="623">Banco Pan</option>
                                    <option value="612">Banco Guanabara</option>
                                    <option value="633">Banco Rendimento</option>
                                    <option value="735">Neon (via Votorantim)</option>
                                    <option value="707">Banco Daycoval</option>
                                    <option value="999">Outros</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-2">
                            <div class="mb-1">
                                <label for="agencia_conta" class="form-label">Agência</label>
                                <input type="text" id="agencia_conta" class="form-control form-control-sm">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-1">
                                <label for="numero_conta" class="form-label">Conta</label>
                                <input type="text" id="numero_conta" class="form-control form-control-sm">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-1">
                                <label for="tipo_conta" class="form-label">Tipo de Conta</label>
                                <select name="tipo_conta" id="tipo_conta" class="form-select form-select-sm">
                                    <option selected value="corrente">Corrente</option>
                                    <option value="poupanca">Poupança</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-1">
                                <label for="chave_pix" class="form-label">Chave Pix</label>
                                <input type="text" id="chave_pix" class="form-control form-control-sm">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-1">
                                <label for="tipo_chave_pix" class="form-label">Tipo de Chave Pix</label>
                                <select name="tipo_chave_pix" id="tipo_chave_pix" class="form-select form-select-sm">
                                    <option selected value="cpf">CPF</option>
                                    <option value="cnpj">CNPJ</option>
                                    <option value="email">E-mail</option>
                                    <option value="telefone">Telefone</option>
                                    <option value="aleatoria">Aleatória</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-1 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="ativo" name="ativo" checked>
                            <label class="form-check-label" for="ativo">
                                Ativo
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="saveNovoProfissionalBtn" class="btn-modern"><i class="bi bi-floppy"></i>
                    Salvar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal modal-xl fade" id="plantoesProfissionalModal" data-bs-backdrop="static" tabindex="-2" aria-labelledby="plantoesProfissionalModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="plantoesProfissionalModalLabel">Plantoes do(a) Profissional</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="card mb-2">
                    <div class="card-header">
                        <div class="row">
                            <div class="col-md-12">
                                <div class="mb-1 text-center">
                                    <label for="">Resumo dos Últimos 90 dias</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3 text-center">
                            <div class="col small">
                                <label for="">Total de plantoes</label>
                                <input type="text" id="total_plantoes" readonly class="form-control form-control-sm text-center">
                            </div>
                            <div class="col small">
                                <label for="">Horas devidas</label>
                                <input type="text" id="horas_devidas" readonly class="form-control form-control-sm text-center">
                            </div>
                            <div class="col small">
                                <label for="">Horas cumpridas</label>
                                <input type="text" id="horas_cumpridas" readonly class="form-control form-control-sm text-center">
                            </div>
                            <div class="col small">
                                <label for="">Plantoes finalizados</label>
                                <input type="text" id="plantoes_finalizados" readonly class="form-control form-control-sm text-center">
                            </div>
                            <div class="col small">
                                <label for="">Plantoes expirados</label>
                                <input type="text" id="plantoes_expirados" readonly class="form-control form-control-sm text-center">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12">
                        <div class="mb-1">
                            <ul class="nav nav-tabs" id="myTab" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="andamento-tab" data-bs-toggle="tab" data-bs-target="#andamento" type="button">
                                        Andamento
                                    </button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link text-success" id="finalizados-tab" data-bs-toggle="tab" data-bs-target="#finalizados" type="button">
                                        Finalizados
                                    </button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link text-danger" id="expirados-tab" data-bs-toggle="tab" data-bs-target="#expirados" type="button">
                                        Expirados
                                    </button>
                                </li>
                            </ul>

                            <div class="tab-content mt-3">
                                <div class="tab-pane fade show active" id="andamento">
                                    <div id="plantoes-andamento" class="row">
                                    </div>
                                </div>
                                <div class="tab-pane fade" id="finalizados">
                                    <div id="plantoes-finalizados" class="row">
                                    </div>
                                </div>
                                <div class="tab-pane fade" id="expirados">
                                    <div id="plantoes-expirados" class="row">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>


            </div>
        </div>
    </div>
</div>
